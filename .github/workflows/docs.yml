name: documentation

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: sagemath/sagemath:latest
      options: --user root

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug package import
        run: |
          sage -python -c "import quiver_tools; print('IMPORT OK'); print(quiver_tools.__file__)"

      - name: Install dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive

          apt-get update
          apt-get install -y \
            tzdata \
            make \
            texlive \
            texlive-latex-extra \
            texlive-luatex \
            latexmk \
            fonts-freefont-otf \
            xindy \
            python3-sphinx

          sage --pip install sphinx
          sage --pip install sphinx-book-theme

          # install your package into environment
          mkdir -p /tmp/build
          cp -r . /tmp/build/
          cd /tmp/build
          rm -rf .git

          sage --pip install .

      - name: Build documentation
        run: |
          cd docs

          sage -sh -c "python3 -m sphinx.cmd.build -W --keep-going -b html . _build/html"
          sage -sh -c "python3 -m sphinx.cmd.build -b latex . _build/latex"

          cd _build/latex
          latexmk -pdf -dvi- -ps- *.tex

      - name: Prepare Pages artifact
        run: |
          rm -rf pages
          mkdir -p pages

          cp -a docs/_build/html/. pages/
          touch pages/.nojekyll

          mkdir -p pages/pdf
          cp docs/_build/latex/*.pdf pages/pdf/ || true

          echo "Pages contents:"
          ls -R pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4